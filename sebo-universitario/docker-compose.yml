services:
  db:
    image: postgres:16-alpine
    container_name: sebo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sebo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sebo123}
      POSTGRES_DB: ${POSTGRES_DB:-sebo_universitario}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sebo} -d ${POSTGRES_DB:-sebo_universitario}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: sebo_api
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-sebo}:${POSTGRES_PASSWORD:-sebo123}@db:5432/${POSTGRES_DB:-sebo_universitario}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-antes-de-publicar}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:3000,http://localhost:5173}
      ENABLE_DEMO_LOGIN: ${ENABLE_DEMO_LOGIN:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sebo-api.rule=Host(`${API_HOST:-api.localhost}`)"
      - "traefik.http.routers.sebo-api.entrypoints=web,websecure"
      - "traefik.http.services.sebo-api.loadbalancer.server.port=4000"
      - "traefik.http.routers.sebo-api.tls=true"
      - "traefik.http.routers.sebo-api.tls.certresolver=myresolver"

  web:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_DEMO_LOGIN: ${ENABLE_DEMO_LOGIN:-true}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    container_name: sebo_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sebo-web.rule=Host(`${WEB_HOST:-localhost}`)"
      - "traefik.http.routers.sebo-web.entrypoints=web,websecure"
      - "traefik.http.services.sebo-web.loadbalancer.server.port=80"
      - "traefik.http.routers.sebo-web.tls=true"
      - "traefik.http.routers.sebo-web.tls.certresolver=myresolver"

volumes:
  postgres_data:

networks:
  traefik-public:
    external: true
